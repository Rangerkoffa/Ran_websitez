
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary)}
.app{min-height:600px;display:flex;flex-direction:column}
.nav{display:flex;gap:8px;padding:1rem 1.25rem;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary)}
.nav button{padding:6px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
.nav button.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-primary)}
.view{display:none;padding:1.5rem}
.view.active{display:block}

/* Kiosk */
.kiosk-card{max-width:460px;margin:0 auto;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem}
.kiosk-card h2{font-size:20px;font-weight:500;margin-bottom:0.25rem;color:var(--color-text-primary)}
.kiosk-card p{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px}
.btn-primary{width:100%;padding:10px;border-radius:var(--border-radius-md);border:none;background:#185FA5;color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:0.5rem}
.btn-primary:hover{background:#0C447C}
.ticket-box{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center;margin-top:1.5rem}
.ticket-num{font-size:52px;font-weight:500;color:#0C447C;line-height:1}
.ticket-label{font-size:12px;color:#185FA5;margin-bottom:8px}
.ticket-info{font-size:13px;color:#185FA5;margin-top:8px}
.ticket-pos{font-size:13px;color:#0C447C;font-weight:500;margin-top:4px}

/* Display board */
.board{background:#0C1F3F;border-radius:var(--border-radius-lg);padding:1.5rem;color:#fff;min-height:320px}
.board-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.board-title{font-size:16px;font-weight:500;color:#B5D4F4}
.board-time{font-size:14px;color:#378ADD}
.board-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.teller-card{background:#0F3060;border-radius:var(--border-radius-md);padding:12px;text-align:center}
.teller-name{font-size:11px;color:#85B7EB;margin-bottom:4px}
.teller-serving{font-size:26px;font-weight:500;color:#fff;min-height:36px}
.teller-status{font-size:11px;margin-top:4px}
.status-open{color:#5DCAA5}
.status-busy{color:#FAC775}
.now-calling{background:#185FA5;border-radius:var(--border-radius-md);padding:12px 16px;display:flex;align-items:center;gap:12px}
.now-label{font-size:11px;color:#85B7EB;margin-bottom:2px}
.now-val{font-size:22px;font-weight:500;color:#fff}
.arrow{font-size:22px;color:#378ADD}
.queue-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.q-chip{background:#0F3060;border-radius:var(--border-radius-md);padding:4px 10px;font-size:12px;color:#B5D4F4}

/* Admin */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:12px;margin-bottom:1.25rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:500;color:var(--color-text-primary)}
.admin-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.admin-section h3{font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)}
.queue-table{width:100%;border-collapse:collapse;font-size:13px}
.queue-table th{text-align:left;padding:6px 10px;color:var(--color-text-secondary);font-weight:400;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.queue-table td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.badge{display:inline-block;padding:2px 8px;border-radius:var(--border-radius-md);font-size:11px}
.badge-wait{background:#FAEEDA;color:#633806}
.badge-served{background:#EAF3DE;color:#27500A}
.badge-calling{background:#E6F1FB;color:#0C447C}
.call-btn{padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid #185FA5;background:transparent;color:#185FA5;font-size:12px;cursor:pointer}
.call-btn:hover{background:#E6F1FB}
.teller-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.teller-row:last-child{border-bottom:none}
.teller-info{font-size:13px;color:var(--color-text-primary)}
.teller-sub{font-size:11px;color:var(--color-text-secondary)}
.announce-bar{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:var(--border-radius-md);padding:10px 14px;font-size:13px;color:#0C447C;margin-bottom:1rem;display:none}
</style>

<div class="app">
<div class="nav">
  <button class="active" onclick="switchView('kiosk')">Customer kiosk</button>
  <button onclick="switchView('board')">Display board</button>
  <button onclick="switchView('admin')">Admin panel</button>
</div>

<!-- KIOSK VIEW -->
<div class="view active" id="view-kiosk">
  <div class="kiosk-card">
    <h2>Welcome to City Bank</h2>
    <p>Please fill in your details to receive your queue ticket</p>
    <div id="kiosk-form">
      <div class="field"><label>Full name</label><input id="k-name" placeholder="e.g. Jean Mutoni" /></div>
      <div class="field"><label>Account number (optional)</label><input id="k-acct" placeholder="e.g. 0012345678" /></div>
      <div class="field"><label>Service needed</label>
        <select id="k-service">
          <option value="">Select a service…</option>
          <option value="Deposits & withdrawals">Deposits &amp; withdrawals</option>
          <option value="Account opening">Account opening</option>
          <option value="Loans & credit">Loans &amp; credit</option>
          <option value="Foreign exchange">Foreign exchange</option>
          <option value="General enquiry">General enquiry</option>
        </select>
      </div>
      <button class="btn-primary" onclick="issueTicket()">Get my ticket</button>
    </div>
    <div id="kiosk-ticket" style="display:none">
      <div class="ticket-box">
        <div class="ticket-label">Your ticket number</div>
        <div class="ticket-num" id="t-num"></div>
        <div class="ticket-info" id="t-service"></div>
        <div class="ticket-pos" id="t-pos"></div>
      </div>
      <button class="btn-primary" style="margin-top:1rem;background:transparent;color:#185FA5;border:0.5px solid #185FA5" onclick="resetKiosk()">New ticket</button>
    </div>
  </div>
</div>

<!-- DISPLAY BOARD VIEW -->
<div class="view" id="view-board">
  <div class="board">
    <div class="board-header">
      <div class="board-title">City Bank — Queue display</div>
      <div class="board-time" id="board-time"></div>
    </div>
    <div class="board-grid" id="teller-grid"></div>
    <div class="now-calling" id="now-calling-box" style="display:none">
      <div>
        <div class="now-label">Now calling</div>
        <div class="now-val" id="nc-num"></div>
      </div>
      <div class="arrow">→</div>
      <div>
        <div class="now-label">Please go to</div>
        <div class="now-val" id="nc-teller"></div>
      </div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:#85B7EB">Waiting in queue</div>
    <div class="queue-row" id="board-queue"></div>
  </div>
</div>

<!-- ADMIN VIEW -->
<div class="view" id="view-admin">
  <div class="announce-bar" id="announce-bar"></div>
  <div class="admin-grid">
    <div class="stat-card"><div class="stat-label">Waiting</div><div class="stat-val" id="a-waiting">0</div></div>
    <div class="stat-card"><div class="stat-label">Served today</div><div class="stat-val" id="a-served">0</div></div>
    <div class="stat-card"><div class="stat-label">Tellers active</div><div class="stat-val" id="a-tellers">3</div></div>
    <div class="stat-card"><div class="stat-label">Avg wait (min)</div><div class="stat-val" id="a-wait">0</div></div>
  </div>

  <div class="admin-section">
    <h3>Teller stations</h3>
    <div id="admin-tellers"></div>
  </div>

  <div class="admin-section">
    <h3>Queue</h3>
    <table class="queue-table">
      <thead><tr><th>Ticket</th><th>Name</th><th>Service</th><th>Status</th><th>Action</th></tr></thead>
      <tbody id="admin-queue"></tbody>
    </table>
  </div>
</div>
</div>

<script>
const TELLERS = [
  {id:1, name:'Teller 1', agent:'Alice N.', busy:false, current:null},
  {id:2, name:'Teller 2', agent:'Bob K.', busy:false, current:null},
  {id:3, name:'Teller 3', agent:'Celine M.', busy:false, current:null}
];

let queue = [];
let servedCount = 0;
let ticketCounter = 1;
let lastAnnounced = null;

function generateTicket(){
  const n = ticketCounter++;
  return 'A' + String(n).padStart(3,'0');
}

function issueTicket(){
  const name = document.getElementById('k-name').value.trim();
  const service = document.getElementById('k-service').value;
  if(!name||!service){alert('Please fill in your name and select a service.');return;}
  const acct = document.getElementById('k-acct').value.trim();
  const num = generateTicket();
  const pos = queue.filter(q=>q.status==='waiting').length + 1;
  queue.push({num, name, acct, service, status:'waiting', time: new Date()});
  document.getElementById('t-num').textContent = num;
  document.getElementById('t-service').textContent = service;
  document.getElementById('t-pos').textContent = pos === 1 ? 'You are next!' : 'Position in queue: ' + pos;
  document.getElementById('kiosk-form').style.display='none';
  document.getElementById('kiosk-ticket').style.display='block';
  render();
}

function resetKiosk(){
  document.getElementById('k-name').value='';
  document.getElementById('k-acct').value='';
  document.getElementById('k-service').value='';
  document.getElementById('kiosk-form').style.display='block';
  document.getElementById('kiosk-ticket').style.display='none';
}

function callNext(tellerId){
  const teller = TELLERS.find(t=>t.id===tellerId);
  if(!teller||teller.busy) return;
  const next = queue.find(q=>q.status==='waiting');
  if(!next){alert('No customers waiting.');return;}
  next.status='calling';
  teller.busy=true;
  teller.current=next.num;
  lastAnnounced = {num: next.num, teller: teller.name};
  announce(next.num, teller.name, next.name);
  setTimeout(()=>{
    next.status='served';
    teller.busy=false;
    teller.current=null;
    servedCount++;
    render();
  },8000);
  render();
}

function announce(num, tellerName, customerName){
  const msg = `Ticket ${num.split('').join(' ')}, ${customerName}, please proceed to ${tellerName}.`;
  if('speechSynthesis' in window){
    const u = new SpeechSynthesisUtterance(msg);
    u.rate=0.9; u.pitch=1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
  const bar = document.getElementById('announce-bar');
  bar.textContent = '📢 ' + msg;
  bar.style.display='block';
  setTimeout(()=>{ bar.style.display='none'; }, 7000);
  render();
}

function render(){
  renderBoard();
  renderAdmin();
}

function renderBoard(){
  const grid = document.getElementById('teller-grid');
  grid.innerHTML = TELLERS.map(t=>`
    <div class="teller-card">
      <div class="teller-name">${t.name}</div>
      <div class="teller-serving">${t.current||'—'}</div>
      <div class="teller-status ${t.busy?'status-busy':'status-open'}">${t.busy?'Serving…':'Available'}</div>
    </div>
  `).join('');

  const ncBox = document.getElementById('now-calling-box');
  if(lastAnnounced){
    ncBox.style.display='flex';
    document.getElementById('nc-num').textContent=lastAnnounced.num;
    document.getElementById('nc-teller').textContent=lastAnnounced.teller;
  } else {
    ncBox.style.display='none';
  }

  const waiting = queue.filter(q=>q.status==='waiting');
  document.getElementById('board-queue').innerHTML = waiting.length
    ? waiting.map(q=>`<div class="q-chip">${q.num}</div>`).join('')
    : '<span style="font-size:12px;color:#85B7EB">No customers waiting</span>';
}

function renderAdmin(){
  const waiting = queue.filter(q=>q.status==='waiting').length;
  const avgWait = waiting > 0 ? Math.round(waiting * 4) : 0;
  document.getElementById('a-waiting').textContent = waiting;
  document.getElementById('a-served').textContent = servedCount;
  document.getElementById('a-wait').textContent = avgWait;
  document.getElementById('a-tellers').textContent = TELLERS.filter(t=>!t.busy).length;

  document.getElementById('admin-tellers').innerHTML = TELLERS.map(t=>`
    <div class="teller-row">
      <div>
        <div class="teller-info">${t.name} — ${t.agent}</div>
        <div class="teller-sub">${t.busy?'Serving '+t.current:'Available'}</div>
      </div>
      <button class="call-btn" onclick="callNext(${t.id})" ${t.busy?'disabled style="opacity:.4;cursor:default"':''}>Call next</button>
    </div>
  `).join('');

  const tbody = document.getElementById('admin-queue');
  const visible = queue.slice().reverse().slice(0,20);
  tbody.innerHTML = visible.length ? visible.map(q=>`
    <tr>
      <td><strong>${q.num}</strong></td>
      <td>${q.name}</td>
      <td>${q.service}</td>
      <td><span class="badge ${q.status==='waiting'?'badge-wait':q.status==='calling'?'badge-calling':'badge-served'}">${q.status}</span></td>
      <td>${q.status==='waiting'?`<button class="call-btn" onclick="callSpecific('${q.num}')">Call now</button>`:'—'}</td>
    </tr>
  `).join('') : '<tr><td colspan="5" style="color:var(--color-text-secondary);font-size:13px;padding:1rem 10px">No tickets issued yet</td></tr>';
}

function callSpecific(num){
  const freeTeller = TELLERS.find(t=>!t.busy);
  if(!freeTeller){alert('All tellers are currently busy.');return;}
  const item = queue.find(q=>q.num===num&&q.status==='waiting');
  if(!item) return;
  item.status='calling';
  freeTeller.busy=true;
  freeTeller.current=num;
  lastAnnounced={num, teller:freeTeller.name};
  announce(num, freeTeller.name, item.name);
  setTimeout(()=>{
    item.status='served';
    freeTeller.busy=false;
    freeTeller.current=null;
    servedCount++;
    render();
  },8000);
  render();
}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  event.target.classList.add('active');
}

function updateClock(){
  const now = new Date();
  document.getElementById('board-time').textContent = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

setInterval(updateClock,1000);
updateClock();
render();
</script>
